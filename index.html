<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミーム登録送信アプリ</title>
    <style>
        :root {
            --bg: #eef3f8;
            --panel: #ffffff;
            --text: #18212f;
            --muted: #647084;
            --line: #d9e0ea;
            --primary: #1f7a6d;
            --primary-dark: #15594f;
            --danger: #c43c4e;
            --warn: #8a5a12;
            --shadow: 0 10px 28px rgba(24, 33, 47, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
        }

        header {
            padding: 28px 20px 18px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }

        .header-inner {
            width: min(1120px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 14px;
            align-items: start;
        }

        .drawer-toggle {
            width: 42px;
            height: 42px;
            padding: 0;
            display: inline-grid;
            place-items: center;
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 22px;
            line-height: 1;
            background: #ffffff;
        }

        .drawer-toggle:hover {
            background: #edf2f7;
        }

        .drawer-toggle span {
            display: block;
            transition: transform 0.2s ease;
        }

        body.form-collapsed .drawer-toggle span {
            transform: rotate(180deg);
        }

        .title-block {
            min-width: 0;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .admin-button {
            align-self: start;
            white-space: nowrap;
        }

        main {
            width: min(1280px, 100%);
            margin: 0 auto;
            min-height: calc(100vh - 137px);
            padding: 18px 20px 20px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            transition: grid-template-columns 0.22s ease;
        }

        body.form-collapsed main {
            grid-template-columns: 0 1fr;
            gap: 0;
        }

        body.admin-locked main {
            grid-template-columns: 1fr;
        }

        body.admin-locked .form-panel,
        body.admin-locked .drawer-toggle,
        body.admin-locked .admin-only {
            display: none;
        }

        section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .panel {
            padding: 18px;
        }

        .form-panel {
            overflow: hidden;
            min-width: 0;
            opacity: 1;
            transform: translateX(0);
            transition: opacity 0.18s ease, transform 0.22s ease, padding 0.22s ease, border-width 0.22s ease;
        }

        body.form-collapsed .form-panel {
            padding-right: 0;
            padding-left: 0;
            border-width: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-18px);
        }

        .search-panel {
            min-width: 0;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 18px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            font: inherit;
            background: #fff;
        }

        textarea {
            min-height: 72px;
            resize: vertical;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 11px 14px;
            color: #fff;
            font: inherit;
            font-weight: 700;
            background: var(--primary);
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button.secondary {
            color: var(--text);
            border: 1px solid var(--line);
            background: #f7f9fc;
        }

        button.secondary:hover {
            background: #edf2f7;
        }

        button.danger {
            background: var(--danger);
        }

        button.warn {
            background: var(--warn);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .actions button {
            flex: 1;
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 16px;
        }

        .status {
            min-height: 20px;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .tag-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .tag-chip {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px 9px;
            color: var(--text);
            font-size: 12px;
            font-weight: 700;
            background: #f7f9fc;
        }

        .tag-chip:hover {
            background: #e8f2ef;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            align-content: start;
            gap: 12px;
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding-right: 4px;
        }

        .meme-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .meme-card img {
            width: 100%;
            height: 118px;
            object-fit: cover;
            display: block;
            background: #edf2f7;
        }

        .meme-body {
            padding: 10px;
            display: flex;
            flex: 1;
            flex-direction: column;
        }

        .meme-title {
            margin: 0 0 5px;
            font-size: 14px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meme-phrase {
            margin: 0 0 7px;
            color: var(--text);
            font-size: 13px;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            color: var(--muted);
            font-size: 11px;
            overflow-wrap: anywhere;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: auto;
            padding-top: 10px;
        }

        .card-actions button {
            padding: 8px 6px;
            font-size: 12px;
        }

        .empty {
            padding: 28px;
            color: var(--muted);
            text-align: center;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: #f8fafc;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            place-items: center;
            padding: 20px;
            background: rgba(24, 33, 47, 0.48);
        }

        .modal-backdrop.is-open {
            display: grid;
        }

        .modal {
            width: min(520px, 100%);
            max-height: min(720px, calc(100vh - 40px));
            overflow: auto;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 18px 44px rgba(24, 33, 47, 0.24);
        }

        .modal h2 {
            margin-bottom: 8px;
        }

        .modal-text {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .duplicate-list {
            display: grid;
            gap: 8px;
            margin: 12px 0 16px;
        }

        .duplicate-item {
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 10px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
        }

        .duplicate-item img {
            width: 64px;
            height: 54px;
            object-fit: cover;
            border-radius: 6px;
            background: #edf2f7;
        }

        .duplicate-title {
            margin: 0 0 3px;
            font-size: 14px;
            line-height: 1.35;
        }

        .duplicate-meta {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        @media (max-width: 840px) {
            .header-inner {
                width: 100%;
                grid-template-columns: auto 1fr;
            }

            .admin-button {
                grid-column: 1 / -1;
            }

            main {
                grid-template-columns: 1fr;
            }

            body.form-collapsed main {
                grid-template-columns: 1fr;
            }

            body.form-collapsed .form-panel {
                display: none;
            }

            .results {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                max-height: none;
                overflow: visible;
            }
        }

        @media (max-width: 520px) {
            .results {
                grid-template-columns: 1fr;
            }

            .meme-card img {
                height: 170px;
            }
        }
    </style>
</head>
<body class="admin-locked">
    <header>
        <div class="header-inner">
            <button id="drawerToggle" class="drawer-toggle" type="button" aria-label="登録パネルを閉じる" aria-expanded="true">
                <span>‹</span>
            </button>
            <div class="title-block">
                <h1>ミーム登録送信アプリ</h1>
                <p class="subtitle">画像・セリフ・タグをSQLiteに保存して、キーワードで近いミームを探します。</p>
            </div>
            <button id="adminButton" class="admin-button secondary" type="button">管理ログイン</button>
        </div>
    </header>

    <main>
        <section class="panel form-panel" id="formPanel">
            <h2 id="formTitle">ミーム登録</h2>
            <form id="createForm">
                <input id="memeId" type="hidden">

                <label for="title">タイトル</label>
                <input id="title" name="title" required placeholder="例: 感想ですよね">

                <label for="phrase">セリフ・本文</label>
                <textarea id="phrase" name="phrase" required placeholder="例: それってあなたの感想ですよね"></textarea>

                <label for="tags">タグ</label>
                <input id="tags" name="tags" placeholder="例: 反論, 論破, 煽り">
                <div id="tagSuggestions" class="tag-suggestions"></div>

                <label for="note">メモ</label>
                <textarea id="note" name="note" placeholder="使いどころや補足"></textarea>

                <label for="source_url">元URL</label>
                <input id="source_url" name="source_url" placeholder="画像を拾った場所など">

                <label for="image">画像</label>
                <input id="image" name="image" type="file" accept="image/*" required>

                <div class="actions">
                    <button id="submitButton" type="submit">登録</button>
                    <button id="cancelEditButton" type="button" class="secondary">クリア</button>
                </div>
            </form>
            <p id="createStatus" class="status"></p>
        </section>

        <section class="panel search-panel">
            <h2>検索</h2>
            <div class="search-row">
                <input id="searchInput" placeholder="例: それじゃね？ / 論破 / 煽り">
                <button id="searchButton">検索</button>
            </div>
            <div id="results" class="results"></div>
        </section>
    </main>

    <div id="duplicateModal" class="modal-backdrop" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="duplicateModalTitle">
            <h2 id="duplicateModalTitle">似ている画像があります</h2>
            <p class="modal-text">既に登録済みの画像に近いものが見つかりました。コラ画像や派生画像なら、そのまま登録できます。</p>
            <div id="duplicateList" class="duplicate-list"></div>
            <div class="modal-actions">
                <button id="duplicateCancelButton" type="button" class="secondary">登録をやめる</button>
                <button id="duplicateConfirmButton" type="button">それでも登録</button>
            </div>
        </div>
    </div>

    <script>
        const createForm = document.getElementById("createForm");
        const createStatus = document.getElementById("createStatus");
        const drawerToggle = document.getElementById("drawerToggle");
        const adminButton = document.getElementById("adminButton");
        const formTitle = document.getElementById("formTitle");
        const memeIdInput = document.getElementById("memeId");
        const submitButton = document.getElementById("submitButton");
        const cancelEditButton = document.getElementById("cancelEditButton");
        const searchInput = document.getElementById("searchInput");
        const searchButton = document.getElementById("searchButton");
        const results = document.getElementById("results");
        const tagInput = document.getElementById("tags");
        const imageInput = document.getElementById("image");
        const tagSuggestions = document.getElementById("tagSuggestions");
        const duplicateModal = document.getElementById("duplicateModal");
        const duplicateList = document.getElementById("duplicateList");
        const duplicateCancelButton = document.getElementById("duplicateCancelButton");
        const duplicateConfirmButton = document.getElementById("duplicateConfirmButton");
        const commonTags = ["煽り", "論破", "反論", "驚き", "悲しい", "喜び", "困惑", "同意", "拒否", "汎用"];
        let currentMemes = [];
        let adminToken = localStorage.getItem("memeAdminToken") || "";
        localStorage.removeItem("memeAdminPassword");

        const authHeaders = () => {
            return adminToken ? { "X-Meme-Admin-Token": adminToken } : {};
        };

        const updateAdminState = (isAdmin) => {
            document.body.classList.toggle("admin-locked", !isAdmin);
            document.body.classList.toggle("admin-unlocked", isAdmin);
            adminButton.textContent = isAdmin ? "管理ログアウト" : "管理ログイン";
        };

        const verifyAdminToken = async (token) => {
            const response = await fetch("/api/auth/check", {
                method: "POST",
                headers: { "X-Meme-Admin-Token": token },
            });
            return response.ok;
        };

        const ensureAdmin = async () => {
            if (adminToken && await verifyAdminToken(adminToken)) {
                updateAdminState(true);
                return true;
            }

            const password = prompt("管理パスワードを入力してください。");
            if (!password) {
                updateAdminState(false);
                return false;
            }

            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "X-Meme-Admin-Password": password },
            });

            if (!response.ok) {
                localStorage.removeItem("memeAdminToken");
                adminToken = "";
                updateAdminState(false);
                alert("管理パスワードが違います。");
                return false;
            }

            const result = await response.json();
            adminToken = result.token;
            localStorage.setItem("memeAdminToken", adminToken);
            updateAdminState(true);
            return true;
        };

        const initializeAdminState = async () => {
            if (!adminToken) {
                updateAdminState(false);
                return;
            }

            if (await verifyAdminToken(adminToken)) {
                updateAdminState(true);
                return;
            }

            localStorage.removeItem("memeAdminToken");
            adminToken = "";
            updateAdminState(false);
        };

        const setFormCollapsed = (collapsed) => {
            document.body.classList.toggle("form-collapsed", collapsed);
            drawerToggle.setAttribute("aria-expanded", String(!collapsed));
            drawerToggle.setAttribute("aria-label", collapsed ? "登録パネルを開く" : "登録パネルを閉じる");
            localStorage.setItem("memeFormCollapsed", collapsed ? "1" : "0");
        };

        const escapeHtml = (value) => {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        };

        const loadMemes = async () => {
            const query = searchInput.value.trim();
            const response = await fetch(`/api/memes?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            currentMemes = data.memes;
            renderMemes(data.memes);
        };

        const renderTagSuggestions = () => {
            tagSuggestions.innerHTML = commonTags.map((tag) => `
                <button class="tag-chip" type="button" onclick="addTag('${tag}')">${tag}</button>
            `).join("");
        };

        const resetFormMode = (clearStatus = true) => {
            createForm.reset();
            memeIdInput.value = "";
            imageInput.required = true;
            formTitle.textContent = "ミーム登録";
            submitButton.textContent = "登録";
            cancelEditButton.textContent = "クリア";
            if (clearStatus) {
                createStatus.textContent = "";
            }
        };

        const renderMemes = (memes) => {
            if (!memes.length) {
                results.innerHTML = `<div class="empty">登録済みミームがありません。</div>`;
                return;
            }

            results.innerHTML = memes.map((meme) => `
                <article class="meme-card">
                    <img src="${escapeHtml(meme.image_url)}" alt="${escapeHtml(meme.title)}">
                    <div class="meme-body">
                        <h3 class="meme-title">${escapeHtml(meme.title)}</h3>
                        <p class="meme-phrase">${escapeHtml(meme.phrase)}</p>
                        <div class="meta">タグ: ${escapeHtml(meme.tags || "なし")}</div>
                        <div class="meta">ID: ${escapeHtml(meme.id)} / 近さ: ${Math.round(meme.score * 100)}%</div>
                        <div class="card-actions admin-only">
                            <button onclick="sendDiscord('${meme.id}')">Discord</button>
                            <button class="warn" onclick="startEdit('${meme.id}')">編集</button>
                            <button class="danger" onclick="deleteMeme('${meme.id}')">削除</button>
                        </div>
                    </div>
                </article>
            `).join("");
        };

        const duplicateMatchLabel = (match) => {
            if (match.match_type === "exact") {
                return "完全一致";
            }
            return `類似 / 距離 ${match.distance}`;
        };

        const showDuplicateModal = (matches) => {
            const items = [...matches.exact, ...matches.similar].slice(0, 8);
            duplicateList.innerHTML = items.map((match) => `
                <article class="duplicate-item">
                    <img src="${escapeHtml(match.image_url)}" alt="${escapeHtml(match.title)}">
                    <div>
                        <h3 class="duplicate-title">${escapeHtml(match.title)}</h3>
                        <p class="duplicate-meta">${escapeHtml(duplicateMatchLabel(match))}</p>
                        <p class="duplicate-meta">${escapeHtml(match.phrase || "")}</p>
                    </div>
                </article>
            `).join("");

            duplicateModal.classList.add("is-open");
            duplicateModal.setAttribute("aria-hidden", "false");
            duplicateConfirmButton.focus();

            return new Promise((resolve) => {
                const cleanup = (result) => {
                    duplicateModal.classList.remove("is-open");
                    duplicateModal.setAttribute("aria-hidden", "true");
                    duplicateConfirmButton.removeEventListener("click", onConfirm);
                    duplicateCancelButton.removeEventListener("click", onCancel);
                    duplicateModal.removeEventListener("click", onBackdrop);
                    document.removeEventListener("keydown", onKeydown);
                    resolve(result);
                };

                const onConfirm = () => cleanup(true);
                const onCancel = () => cleanup(false);
                const onBackdrop = (event) => {
                    if (event.target === duplicateModal) {
                        cleanup(false);
                    }
                };
                const onKeydown = (event) => {
                    if (event.key === "Escape") {
                        cleanup(false);
                    }
                };

                duplicateConfirmButton.addEventListener("click", onConfirm);
                duplicateCancelButton.addEventListener("click", onCancel);
                duplicateModal.addEventListener("click", onBackdrop);
                document.addEventListener("keydown", onKeydown);
            });
        };

        const submitMemeForm = async (forceDuplicate = false) => {
            if (!await ensureAdmin()) return;

            const editingId = memeIdInput.value;
            createStatus.textContent = editingId ? "更新中..." : "登録中...";

            const formData = new FormData(createForm);
            formData.append("force_duplicate", forceDuplicate ? "true" : "false");
            if (editingId && !imageInput.files.length) {
                formData.delete("image");
            }

            const response = await fetch(editingId ? `/api/memes/${editingId}` : "/api/memes", {
                method: editingId ? "PUT" : "POST",
                headers: authHeaders(),
                body: formData,
            });

            if (response.status === 409) {
                const warning = await response.json();
                const matches = warning.detail.matches;
                if (await showDuplicateModal(matches)) {
                    return submitMemeForm(true);
                }
                createStatus.textContent = "登録をキャンセルしました。";
                return;
            }

            if (!response.ok) {
                const error = await response.json();
                createStatus.textContent = `エラー: ${error.detail || "登録できませんでした。"}`;
                return;
            }

            const result = await response.json();
            resetFormMode(false);
            createStatus.textContent = editingId ? `更新しました。ID: ${result.meme_id}` : `登録しました。ID: ${result.meme_id}`;
            await loadMemes();
        };

        createForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            await submitMemeForm(false);
        });

        adminButton.addEventListener("click", async () => {
            if (adminToken) {
                localStorage.removeItem("memeAdminToken");
                adminToken = "";
                resetFormMode();
                updateAdminState(false);
                return;
            }

            await ensureAdmin();
        });

        cancelEditButton.addEventListener("click", resetFormMode);
        drawerToggle.addEventListener("click", () => {
            setFormCollapsed(!document.body.classList.contains("form-collapsed"));
        });
        searchButton.addEventListener("click", loadMemes);
        searchInput.addEventListener("input", () => {
            window.clearTimeout(searchInput.timer);
            searchInput.timer = window.setTimeout(loadMemes, 250);
        });

        window.addTag = (tag) => {
            const tags = tagInput.value
                .split(",")
                .map((value) => value.trim())
                .filter(Boolean);

            if (!tags.includes(tag)) {
                tags.push(tag);
            }

            tagInput.value = tags.join(", ");
        };

        window.startEdit = (memeId) => {
            if (!adminToken) return;
            const meme = currentMemes.find((item) => item.id === memeId);
            if (!meme) return;

            memeIdInput.value = meme.id;
            document.getElementById("title").value = meme.title;
            document.getElementById("phrase").value = meme.phrase;
            document.getElementById("tags").value = meme.tags;
            document.getElementById("note").value = meme.note;
            document.getElementById("source_url").value = meme.source_url;
            imageInput.required = false;
            formTitle.textContent = "ミーム編集";
            submitButton.textContent = "更新";
            cancelEditButton.textContent = "編集をやめる";
            createStatus.textContent = "画像を選ばなければ、今の画像をそのまま使います。";
            setFormCollapsed(false);
            window.scrollTo({ top: 0, behavior: "smooth" });
        };

        window.sendDiscord = async (memeId) => {
            if (!await ensureAdmin()) return;
            const response = await fetch(`/api/memes/${memeId}/discord`, {
                method: "POST",
                headers: authHeaders(),
            });
            if (!response.ok) {
                const error = await response.json();
                alert(error.detail || "Discordに送信できませんでした。");
                return;
            }
            alert("Discordに送信しました。");
        };

        window.deleteMeme = async (memeId) => {
            if (!await ensureAdmin()) return;
            if (!confirm("このミームを削除しますか？")) return;
            const response = await fetch(`/api/memes/${memeId}`, {
                method: "DELETE",
                headers: authHeaders(),
            });
            if (!response.ok) {
                const error = await response.json();
                alert(error.detail || "削除できませんでした。");
                return;
            }
            await loadMemes();
        };

        renderTagSuggestions();
        initializeAdminState();
        setFormCollapsed(localStorage.getItem("memeFormCollapsed") === "1");
        loadMemes();
    </script>
</body>
</html>
